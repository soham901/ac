name: Build and Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build binary
        run: bun build ./index.ts --outfile ac --target=bun --minify

      - name: Make binary executable
        run: chmod +x ac

      - name: Upload binary
        uses: actions/upload-artifact@v5
        with:
          name: ac-binary
          path: ac

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: ac-binary
          path: .

      - name: Make binary executable
        run: chmod +x ac

      - name: Extract Version from Commit
        id: version
        run: |
          VERSION=$(git log -1 --pretty=%B | grep -oP 'v\d+\.\d+\.\d+' | head -1)
          if [ -z "$VERSION" ]; then
            echo "version=v0.0.1" >> $GITHUB_OUTPUT
          else
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Auto Release Binary
        uses: softprops/action-gh-release@v2
        with:
          files: ac
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true