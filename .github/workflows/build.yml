name: Build and Release

on:
  push:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build binary
        run: bun build ./index.ts --outfile ac --target=bun --minify

      - name: Make binary executable
        run: chmod +x ac

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ac-binary
          path: ac

  release:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ac-binary
          path: .

      - name: Make binary executable
        run: chmod +x ac

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$TAG" ac --clobber