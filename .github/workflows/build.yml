name: Build and Release

on:
  push:
    branches: [master]
    tags: [v*]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build binary
        run: bun build ./index.ts --outfile ac --target=bun --minify

      - name: Make binary executable
        run: chmod +x ac

      - name: Upload binary
        uses: actions/upload-artifact@v5
        with:
          name: ac-binary
          path: ac

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: ac-binary
          path: .

      - name: Make binary executable
        run: chmod +x ac

      - name: Create Release and Upload Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" ac --generate-notes || gh release upload "$TAG" ac --clobber